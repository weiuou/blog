site_name: Weiuou's Blog



theme:
  name: material
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - medis: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: gray
      accent: deep purple
      toggle: 
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.indexes
markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - Welcome~:
    - index.md
    - Page 1: page-1.md
    - Page 2: page-2.md
  - 考研政治:
    - 考研政治/index.md
    - 思修: 考研政治/思修.md
