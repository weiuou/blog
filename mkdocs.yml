site_name: Weiuou's Blog



theme:
  name: material
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - medis: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: gray
      accent: deep purple
      toggle: 
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.indexes
markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
nav:
  - Welcome~:
    - index.md
    - Page 1: page-1.md
    - Page 2: page-2.md
  - 考研政治:
    - 考研政治/index.md
    - 考研政治选择题一页纸: 考研政治/index.md
    - 思修: 考研政治/思修.md
    - 马原: 考研政治/马原.md
    - 人物: 考研政治/人物.md
    - 史纲: 
      - 史纲(全): 考研政治/史纲/史纲.md 
      - 旧民主主义革命阶段: 考研政治/史纲/旧民主主义革命阶段.md
      - 新民主主义革命阶段: 考研政治/史纲/新民主主义革命阶段.md
      - 建国后: 考研政治/史纲/建国后.md
      - 马克思中国化、会议: 考研政治/史纲/其他.md
    - 其他: 考研政治/其他.md
  - 计算机组成原理:
    - 计算机组成原理/index.md
    - 计算机系统概述: 计算机组成原理/第一章/计算机系统概述.md
    - 第二章: 
      - 整数的表示: 计算机组成原理/第二章/整数的表示.md
    - 真题:
      - 计算机组成原理/真题/index.md
  - Redis学习:
    - Redis基本数据类型: redis学习/redis基本数据类型.md
    - Redis通用命令: redis学习/redis通用命令.md
  - AIAgent:
    - Agents Course: hfAIagent/index.md
    - AI代理简介: hfAIagent/Unit1/代理简介.md
    - 什么是LLM: hfAIagent/Unit1/什么是LLM.md
